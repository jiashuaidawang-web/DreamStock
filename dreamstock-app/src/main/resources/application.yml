server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dreamstock
  threads:
    virtual:
      enabled: true
  datasource:
    mysql:
      jdbc-url: jdbc:mysql://localhost:3306/astock_emotion?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: ${MYSQL_PASSWORD:dreamstock}
      driver-class-name: com.mysql.cj.jdbc.Driver
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
    clickhouse:
      jdbc-url: jdbc:clickhouse://localhost:8123/astock_emotion_ck
      username: default
      password: ${CLICKHOUSE_PASSWORD:}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.dreamstock: DEBUG
    com.baomidou.mybatisplus: DEBUG
